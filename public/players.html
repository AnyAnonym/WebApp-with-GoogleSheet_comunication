<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spieler – ASKÖ Piberbach</title>
  <link rel="stylesheet" href="./CSS/styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-bar"
      style="display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px;">
      <!-- NAVIGATION LINKS LINKS -->
      <nav class="main-nav" style="display: flex; gap: 20px;">
        <a href="index.html">Dashboard</a>
        <a href="players.html" class="active">Spieler</a>
        <a href="matches.html">Matches</a>
        <a href="rangliste.html">Rangliste</a>
      </nav>

      <!-- LOGO ZENTRIERT -->
      <div class="logo" style="flex: 1; text-align: center; font-size: 1.4rem; font-weight: 600;">
        ASKÖ Piberbach
      </div>

      <!-- AUTH NAV RECHTS -->
      <div class="auth-buttons" style="display: flex; gap: 10px; align-items: center;">
        <nav class="auth-nav" style="display: flex; gap: 20px;">
          <a href="#" id="openLogin" class="loggedOut">Sign In</a>
          <a href="#" id="openSignup" class="loggedOut">Sign Up</a>
          <a href="#" id="profileButton" class="loggedIn">Profil</a>
          <a href="#" id="signOutButton" class="loggedIn">Sign Out</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Hauptbereich -->
  <main>
    <!-- Hauptinhalt -->
    <section>
      <h2>Spieler</h2>
      <p class="note">Hier findest du die aktuelle Übersicht aller registrierten Spieler.</p>

      <!-- Tabelle der Spieler -->
      <table id="tbl" class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
          </tr>
        </thead>
        <tbody>
          <!-- Dynamisch durch indexTest.js befüllt -->
        </tbody>
      </table>
    </section>

    <!-- Rechte Sidebar -->
    <div class="sidebar">
      <h2>Top 10 Rangliste</h2>
  
      <!-- Zugriffspunkt fürs JS -->
      <ol id="ranking-list" class="ranking-list">
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>
      </ol>
    </div>
  </main>

  <!-- Fußbereich -->
  <footer class="footer">
    © ASKÖ Piberbach – Tennis
  </footer>

  <!-- SKRIPT -->
  <script type="module" src="JS/SDK.js"></script>
  <script type="module" src="JS/modals.js"></script>
  <script type="module" src="JS/playerList.js"></script>
  <script type="module" src="JS/rankingSidebar.js"></script>

</body>
</html>
