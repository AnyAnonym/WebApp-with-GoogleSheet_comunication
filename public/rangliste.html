    <h1>Rangliste – Interaktive Pyramide</h1>

    <div class="pyramid">
      <div class="row">
        <div class="box" draggable="true">1</div>
      </div>
      <div class="row">
        <div class="box" draggable="true">2A</div>
        <div class="box" draggable="true">2B</div>
      </div>
      <div class="row">
        <div class="box" draggable="true">3A</div>
        <div class="box" draggable="true">3B</div>
        <div class="box" draggable="true">3C</div>
      </div>
      <div class="row">
        <div class="box" draggable="true">4A</div>
        <div class="box" draggable="true">4B</div>
        <div class="box" draggable="true">4C</div>
        <div class="box" draggable="true">4D</div>
      </div>
    </div>
