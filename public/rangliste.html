<!DOCTYPE html>
<html lang="de">

<head>

  <title>ASKÖ Piberbach – Rangliste</title>
  <link rel="stylesheet" href="CSS/styles.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-bar"
      style="display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px;">
      <!-- NAVIGATION LINKS LINKS -->
      <nav class="main-nav" style="display: flex; gap: 20px;">
        <a href="index.html">Dashboard</a>
        <a href="players.html">Spieler</a>
        <a href="matches.html">Matches</a>
        <a href="rangliste.html" class="active">Rangliste</a>

        ASKÖ Piberbach

      <!-- AUTH NAV RECHTS -->
      <div class="auth-buttons" style="display: flex; gap: 10px; align-items: center;">
        <nav class="auth-nav" style="display: flex; gap: 20px;">

    <div class="sidebar">

        <li><span class="player-name">–</span></li>
        <li><span class="player-name">–</span></li>

    </div>

  <!-- FOOTER -->
  <footer class="footer">
    © ASKÖ Piberbach – Tennis
  </footer>

  <!-- SKRIPT -->
  <script type="module" src="JS/SDK.js"></script>
  <script type="module" src="JS/modals.js"></script>
  <script type="module" src="./JS/rangliste.js"></script>
  <script type="module">
    import { renderRanking } from "./JS/rangliste.js";
    renderRanking();

  <script type="module" src="JS/rankingSidebar.js"></script>
